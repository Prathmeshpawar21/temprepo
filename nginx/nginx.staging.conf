# ─────────────────────────────────────────────
# Frontend static file server for SPA (React/Vite)
# This container ONLY serves static files.
# Reverse proxy (SSL, /api, /auth routing) is
# handled by nginx in the deployment repo.
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"         always;
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-XSS-Protection       "1; mode=block"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self';
        script-src 'self' 'unsafe-inline'
            https://www.googletagmanager.com
            https://kit.fontawesome.com
            https://checkout.razorpay.com;
        style-src 'self' 'unsafe-inline'
            https://fonts.googleapis.com;
        font-src 'self'
            https://fonts.gstatic.com
            https://ka-f.fontawesome.com;
        img-src 'self' data: blob: https:;
        connect-src 'self'
            https://api-doctor.allcognix.com
            https://auth-personal.allcognix.com
            https://www.google-analytics.com
            https://us.i.posthog.com
            wss://doctor.allcognix.com;
        frame-src 'self'
            https://checkout.razorpay.com
            https://daily.co
            https://*.daily.co;" always;

    # ── Gzip Compression ─────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Static Asset Caching ──────────────────
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA Routing ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health Check endpoint ─────────────────
    location /healthz {
        access_log  off;
        return 200  "ok\n";
        add_header  Content-Type text/plain;
    }

    # ── Block hidden files ────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Error Pages ───────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
